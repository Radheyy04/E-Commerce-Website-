<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product — Clothing Factory</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/custom.css" rel="stylesheet" />
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg rv-navbar">
    <div class="container px-4 px-lg-5">
      <a class="navbar-brand" href="index.html">Clothing<span>Factory</span></a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="categories.html">Categories</a></li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Shop</a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="men.html">Men's Fashion</a></li>
              <li><a class="dropdown-item" href="women.html">Women's Fashion</a></li>
              <li><a class="dropdown-item" href="accessories.html">Accessories</a></li>
            </ul>
          </li>
        </ul>
        <button class="rv-cart-btn rv-open-cart d-flex align-items-center gap-1" type="button">
          <i class="bi bi-bag"></i><span>Cart</span><span class="rv-cart-count">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Product Detail -->
  <section class="py-5">
    <div class="container px-4 px-lg-5" id="product-detail">
      <!-- Rendered by JS -->
      <div class="text-center py-5 text-muted">Loading product…</div>
    </div>
  </section>

  <!-- Related Products -->
  <section class="py-5" style="background:#f7f5f2;">
    <div class="container px-4 px-lg-5">
      <div class="text-center mb-4">
        <h2 class="rv-section-title">You May Also Like</h2>
        <div class="rv-section-divider mx-auto mt-2"></div>
      </div>
      <div class="row gx-4 gy-4 row-cols-2 row-cols-md-4" id="related-grid"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="rv-footer">
    <div class="container px-4 px-lg-5">
      <div class="row align-items-center gy-3">
        <div class="col-12 col-md-4 text-center text-md-start">
          <span style="font-family:'Playfair Display',serif;font-size:1.3rem;color:#fff;">Clothing Factory</span>
        </div>
        <div class="col-12 col-md-4 text-center">
          <p class="mb-0 small">© 2026 Clothing Factory</p>
        </div>
        <div class="col-12 col-md-4 text-center text-md-end">
          <a href="about.html" class="me-3 small">About</a>
          <a href="categories.html" class="small">Categories</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/cart.js"></script>
  <script>
    const PRODUCTS = [
      { id: 'p1', name: 'T-Shirt', price: 10, img: 'https://image.hm.com/assets/hm/00/78/0078c68c540ce238ca44ba75aef8a6f4f038848a.jpg', cat: 'women', sale: false, stars: 0, desc: 'A lightweight everyday essential crafted from breathable cotton. Relaxed fit, versatile and perfect for casual outings.' },
      { id: 'p2', name: 'Sweatshirt', price: 18, originalPrice: 20, img: 'https://image.hm.com/assets/hm/f2/fd/f2fdbd4fbceffb7b0d61684938b8901e97c5bd50.jpg?imwidth=2160.jpg', cat: 'men', sale: true, stars: 5, desc: 'A cozy pullover sweatshirt made from a soft cotton blend. Perfect for layering on cooler days.' },
      { id: 'p3', name: 'Co-ord Set', price: 50, originalPrice: 80, img: 'https://image.hm.com/assets/hm/38/e4/38e47c0788dbb82f3df3eb72998ddbe37bcecbff.jpg?imwidth=2160.jpg', cat: 'women', sale: true, stars: 0, desc: 'A chic matching co-ord set with a contemporary cut. Effortlessly stylish for brunch, outings or casual evenings.' },
      { id: 'p4', name: 'Polo Shirt', price: 40, img: 'https://image.hm.com/assets/hm/fc/9b/fc9b07d03706a96407873f8e68bb5b4110dfdf01.jpg?imwidth=768.jpg', cat: 'men', sale: false, stars: 5, desc: 'A classic polo shirt with a neat collar and subtle texture. Smart-casual perfection for any occasion.' },
      { id: 'p5', name: 'Dress', price: 35, originalPrice: 50, img: 'https://image.hm.com/assets/hm/3a/c5/3ac5a09920c6987f9df3a458b6d4fa99e56440a5.jpg?imwidth=2160.jpg', cat: 'women', sale: true, stars: 0, desc: 'A flattering everyday dress with a relaxed silhouette. Lightweight fabric that drapes beautifully.' },
      { id: 'p6', name: 'Waistcoat', price: 40, img: 'https://image.hm.com/assets/hm/f5/3c/f53c69e6cff5cc51006c6fc1c40ddfe4a89e474b.jpg?imwidth=2160.jpg', cat: 'men', sale: false, stars: 0, desc: 'A structured waistcoat that adds a polished edge to any outfit. Available in multiple sizes.' },
      { id: 'p7', name: 'Handbag', price: 80, originalPrice: 100, img: 'https://image.hm.com/assets/hm/84/2e/842edca5747a39eb76452c8a8763a9f07160d8a5.jpg', cat: 'accessories', sale: true, stars: 5, desc: 'A premium handbag with a clean structured silhouette. Roomy interior with multiple compartments.' },
      { id: 'p8', name: 'Sunglasses', price: 20, img: 'https://image.hm.com/assets/hm/ef/11/ef11ae3bf0d38040d8c43cd9e6c1e6289fc13e38.jpg', cat: 'accessories', sale: false, stars: 5, desc: 'UV-protective sunglasses with a sleek modern frame. The perfect finishing touch to any look.' },
    ];

    const SIZES = ['XS', 'S', 'M', 'L', 'XL'];
    let selectedSize = null;

    function getParam(key) {
      return new URLSearchParams(window.location.search).get(key);
    }

    function starHTML(count, large) {
      if (!count) return '';
      const cls = large ? 'fs-5' : '';
      return `<div class="rv-stars d-flex gap-1 ${cls}">${'<i class="bi bi-star-fill"></i>'.repeat(count)}</div>`;
    }

    function renderProduct(p) {
      const isAccessory = p.cat === 'accessories';
      const sizes = isAccessory ? ['One Size'] : SIZES;
      selectedSize = sizes[0];

      const priceHTML = p.sale && p.originalPrice
        ? `<span class="text-muted text-decoration-line-through me-2">$${p.originalPrice.toFixed(2)}</span><span class="rv-product-detail-price" style="color:#c0392b;">$${p.price.toFixed(2)}</span>`
        : `<span class="rv-product-detail-price">$${p.price.toFixed(2)}</span>`;

      document.getElementById('product-detail').innerHTML = `
        <nav aria-label="breadcrumb" class="mb-4">
          <ol class="breadcrumb rv-breadcrumb" style="font-size:0.8rem;">
            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
            <li class="breadcrumb-item"><a href="${p.cat}.html">${p.cat.charAt(0).toUpperCase() + p.cat.slice(1)}</a></li>
            <li class="breadcrumb-item active">${p.name}</li>
          </ol>
        </nav>
        <div class="row g-5 align-items-start">
          <div class="col-12 col-md-6">
            <img src="${p.img}" class="rv-product-detail-img" alt="${p.name}" />
          </div>
          <div class="col-12 col-md-6">
            ${p.sale ? '<span class="badge" style="background:#111;color:#c8a96e;letter-spacing:1px;font-size:0.7rem;padding:0.3rem 0.7rem;border-radius:2px;font-weight:700;">SALE</span><br>' : ''}
            <h1 class="rv-product-detail-name mt-2 mb-2">${p.name}</h1>
            ${p.stars ? starHTML(p.stars, true) : ''}
            <div class="my-3">${priceHTML}</div>
            <p class="text-muted" style="line-height:1.75;font-size:0.95rem;">${p.desc}</p>
            <hr style="border-color:#e0ddd8;" />
            <div class="mb-3">
              <label class="d-block mb-2" style="font-weight:600;font-size:0.85rem;letter-spacing:0.5px;text-transform:uppercase;">Size</label>
              <div class="d-flex gap-2 flex-wrap rv-sizes" id="size-picker">
                ${sizes.map(s => `<button class="rv-size-btn${s === sizes[0] ? ' active' : ''}" onclick="selectSize('${s}',this)">${s}</button>`).join('')}
              </div>
            </div>
            <div class="d-flex gap-3 flex-wrap mt-4">
              <button class="btn-rv-dark" style="padding:0.7rem 2rem;flex:1;min-width:180px;" onclick="addToCart('${p.id}')">
                <i class="bi bi-bag me-1"></i> Add to Cart
              </button>
              <button class="rv-wishlist-btn-lg" title="Wishlist" onclick="this.classList.toggle('wishlisted')" style="width:48px;height:48px;border:1.5px solid #e0ddd8;background:none;border-radius:4px;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:all 0.3s;" onmouseover="this.style.borderColor='#111'" onmouseout="!this.classList.contains('wishlisted')&&(this.style.borderColor='#e0ddd8')">
                <i class="bi bi-heart" style="color:#111;"></i>
              </button>
            </div>
            <div class="mt-4 p-3" style="background:#f7f5f2;border-radius:8px;font-size:0.82rem;">
              <div class="d-flex align-items-center gap-2 mb-2"><i class="bi bi-truck" style="color:#c8a96e;"></i> Free shipping on orders over $60</div>
              <div class="d-flex align-items-center gap-2 mb-2"><i class="bi bi-arrow-counterclockwise" style="color:#c8a96e;"></i> 30-day easy returns</div>
              <div class="d-flex align-items-center gap-2"><i class="bi bi-shield-check" style="color:#c8a96e;"></i> Secure payment</div>
            </div>
          </div>
        </div>`;

      // Render related
      const related = PRODUCTS.filter(x => x.id !== p.id && x.cat === p.cat).slice(0, 4);
      if (related.length === 0) {
        // fallback: other products
        const others = PRODUCTS.filter(x => x.id !== p.id).slice(0, 4);
        renderRelated(others);
      } else {
        renderRelated(related);
      }

      // Update page title
      document.title = `${p.name} — Clothing Factory`;

      // Store current product for addToCart
      window._currentProduct = p;
    }

    function renderRelated(products) {
      const grid = document.getElementById('related-grid');
      grid.innerHTML = products.map(p => `
        <div class="col mb-2">
          <div class="rv-product-card card h-100">
            ${p.sale ? '<span class="rv-sale-badge badge">Sale</span>' : ''}
            <a href="product.html?id=${p.id}" style="display:block;overflow:hidden;">
              <img class="card-img-top" src="${p.img}" alt="${p.name}" style="height:220px;object-fit:cover;object-position:top;" loading="lazy" />
            </a>
            <div class="card-body p-3 text-center">
              <h5 class="rv-product-name">${p.name}</h5>
              <span class="rv-product-price">${p.sale && p.originalPrice ? `<span class="original">$${p.originalPrice.toFixed(2)}</span><span class="sale">$${p.price.toFixed(2)}</span>` : '$' + p.price.toFixed(2)}</span>
            </div>
            <div class="card-footer border-0 bg-transparent pb-3 pt-1 px-3 text-center">
              <a href="product.html?id=${p.id}" class="btn-rv-outline d-block" style="text-decoration:none;">View Product</a>
            </div>
          </div>
        </div>`).join('');
    }

    function selectSize(size, btn) {
      selectedSize = size;
      document.querySelectorAll('.rv-size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function addToCart(id) {
      const p = window._currentProduct;
      if (!p) return;
      RVCart.addItem({ id: p.id, name: p.name, price: p.price, img: p.img, size: selectedSize });
    }

    // Init
    const pid = getParam('id');
    const product = PRODUCTS.find(p => p.id === pid);
    if (product) {
      renderProduct(product);
    } else {
      document.getElementById('product-detail').innerHTML = `
        <div class="text-center py-5">
          <h3 style="font-family:'Playfair Display',serif;">Product not found</h3>
          <a href="index.html" class="btn-rv-dark mt-3" style="text-decoration:none;display:inline-block;padding:0.6rem 1.5rem;">Back to Shop</a>
        </div>`;
    }
  </script>
</body>
</html>
